services:
  postgres:
    image: postgres:15-alpine
    container_name: ooc-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ooc_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
